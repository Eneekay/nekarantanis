  - section: research
    company: Aristotle University of Thessaloniki
    logo: uploads/banner-horizontal-default-en.png
    subtitle: ""
    dates: Jul 2012 – Mar 2017; Jan 2020 – Aug 2021
    blurb: Aristotle University of Thessaloniki has been the academic home of my
      research career — from postgraduate work on the biomechanics of primate
      locomotion through to a postdoctoral fellowship studying wildcat
      conservation in Northern Greece.
    positions:
      - dates: JAN 2020 – DEC 2021
        title: Postdoctoral Researcher
        icon: search
        primary: true
        bullets:
          - Co-designed a project evaluating wildcat (<em>Felis silvestris
            silvestris</em>) spatial behaviour using telemetry within protected
            areas of Northern Greece.
          - Used telemetry collars, camera traps, and biological signs of
            presence to map wildcat movements and nesting.
          - Led the deployment of <a href="http://www.wildcatproject.gr"
            class="fw-semibold">wildcatproject.gr</a> to disseminate scientific
            knowledge and educate the public on conservation status.
          - Findings published in peer-reviewed conferences and journals.
      - dates: JUL 2012 – MAR 2017
        title: Postgraduate Researcher
        icon: compass
        bullets:
          - Designed and executed a long-term project on ecological implications
            of biomechanics in the evolution of eutherian mammals, with a focus
            on primates.
          - Developed novel methods in high-speed experimental video recording
            and advanced statistical data analysis.
          - Contributed to teaching Morphology and Systematics of Chordata,
            Comparative Animal Anatomy and Histology, and Biological
            Anthropology.
          - Awarded a Doctorate of Philosophy in Biology unanimously by an
            international panel.
          - Published 10 peer-reviewed articles in high impact-factor
            international journals.
