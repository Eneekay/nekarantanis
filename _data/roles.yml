roles:
  - section: leadership
    company: PeoplePlus
    logo: uploads/PP-transparent-cropped.png
    subtitle: HMP Pentonville
    dates: Jun 2025 – Present
    blurb: Committed to social change and enabling people to transform their lives,
      my leadership journey brought me to the education provision in one of the
      UK’s most demanding prisons — HMP Pentonville — enhancing the quality of
      education and learner outcomes while enabling teachers to lead learners
      toward a fulfilling life and away from reoffending.
    positions:
      - dates: JUN 2025 — PRESENT
        title: Education Manager
        icon: shield
        primary: true
        bullets:
          - Leading the strategic and day-to-day management of education in HMP
            Pentonville, a high-pressure Category B prison, ensuring a stable,
            high-quality learning environment.
          - Overseeing a multidisciplinary team delivering tailored learning
            plans, functional skills, and vocational pathways.
          - Refreshing curriculum design to remain responsive to learner
            profiles, employer expectations, and Ofsted requirements.
          - Driving quality improvement through the SAR/QIP cycle, structured
            learning walks, and learner voice activity.
          - Building partnerships with Prison Governors, Industries, and
            external agencies to integrate education into wider rehabilitative
            pathways.
          - Enhancing staff capability through CPD focused on trauma-informed
            practice, behaviour management, and adaptive teaching.
          - Ensuring robust contract delivery and responsible management of the
            site’s education budget.
          - Designed and rolled out a bespoke learner data dashboard, since
            adopted as best practice across the national PeoplePlus prison
            education contract.
          - Launched three new programme strands — Art, Music Production, and
            Peer Mentoring — from initial concept through to live delivery.
          - Leading delivery of Open University and University of Westminster
            Higher Education programmes in Criminology alongside vocational
            provision.
        tags:
          - Secure Facility Leadership
          - Budget Management
          - Justice System
          - Strategic Direction
          - Reduction of Reoffending
          - Learner Analytics
  - section: leadership
    company: Capel Manor College
    logo: uploads/CMC-transparent-cropped.png
    subtitle: Enfield, Brooks Farm, Crystal Palace, Gunnersbury Park, Regent’s Park,
      Mottingham
    dates: Sep 2017 – Feb 2025
    blurb: London’s only specialist environmental college. My journey in leadership
      began here, gaining experience in Further and Higher Education and in
      managing animal collections across zoos and farms — leading the
      transformation of the School of Animal Management and Saddlery through the
      Covid-19 pandemic and beyond.
    positions:
      - dates: APR 2022 — FEB 2025
        title: Director of Studies, Land-Based (Animal Management and Saddlery)
        icon: briefcase
        primary: true
        bullets:
          - Led a team of 100+ across five campuses, implementing a
            cloud-based governance system adopted college-wide.
          - Improved achievement from a −4.5% shortfall against the national
            average to exceeding it by 2%.
          - Drove the strategy for an intranet and digital governance
            platform, standardising processes and resource sharing.
          - Restructured educational offerings and animal collections across
            four campuses, delivering 12% in cost savings.
          - Drove the Attendance Working Group, improving attendance to exceed
            5% over the national average.
          - Contributed to national EdTech efforts via the Landex Learning
            Materials and Technology Committee and JISC T&L Forum.
          - Collaborated with Worshipful Companies to reinvigorate saddlery,
            shoemaking, and leathercraft training, with a £150k growth in
            budget.
          - Saw 20+ new teachers through CET and DET programmes.
          - Grew directorate income from £7.5M to over £9M and enrolment from
            around 900 to 1,200+ learners over three years.
          - Oversaw two science teaching laboratories and led the design and
            commissioning of a new lab at the incoming Mottingham campus.
          - Ran science outreach programmes — school visits, laboratory open
            days, and career fairs — introducing biochemistry and genetics to
            primary and secondary learners.
          - Validated new Access to Higher Education qualifications in
            Veterinary Science, Animal Science, and Shoemaking, and served as
            commissioning contact for a Royal Agricultural University degree
            franchise.
          - Managed two zoos and a public-facing farm, including a zookeeper
            team restructure and full oversight of the Enfield science
            laboratory.
        tags:
          - Large Team Leadership
          - Microsoft SharePoint & Teams
          - Zoo & Farm Management
          - Business Development
          - Sponsorship & Partnerships
          - Science Outreach
      - dates: APR 2020 — MAY 2022
        title: Curriculum Leader, then Head of Animal Management and Saddlery
        icon: book
        bullets:
          - Spearheaded a culture of self-assessment leading to an 88%
            achievement rate, above the national benchmark.
          - Personally moved the digital infrastructure to cloud services and
            workflows via Microsoft 365, college-wide.
          - Mentored and trained four new Team Leaders across the School’s
            largest team of Higher and Further lecturers.
      - dates: SEP 2019 — MAR 2020
        title: Team Leader
        icon: team
        bullets:
          - Led a team of lecturers delivering a wide portfolio of
            animal-focused courses.
          - Collaborated with three major national awarding bodies to ascertain
            fulfilment of educational standards.
      - dates: SEP 2017 — AUG 2019
        title: Higher and Further Education Course Manager
        icon: cap
        bullets:
          - Accomplished over 95% achievement rates across all courses of
            responsibility.
          - Reached 100% satisfaction rates in HE courses as measured in the NSS.
          - Taught Animal Nutrition and Animal Metabolism, including hands-on
            biochemistry laboratory work, at Further and Higher Education
            level.
  - section: digital
