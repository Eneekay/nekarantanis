title: N. E. Karantanis
description: "Portfolio and blog of N. E. Karantanis, PhD — education leadership, CV, and writing."
lang: en
url: "https://nekarantanis.co.uk"
baseurl: ""

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

permalink: /blog/:slug.html

collections:
  posts:
    output: true
  publications:
    output: true
    permalink: /publications/:slug.html

defaults:
  - scope:
      path: ""
    values:
      base: ""
      layout: default
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      base: "../"
  - scope:
      path: ""
      type: publications
    values:
      layout: publication
      base: "../"

exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
