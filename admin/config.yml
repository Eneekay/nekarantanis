# Auth setup: a Cloudflare Worker (github.com/Eneekay/decap-cms-auth, deployed
# at decap-cms-auth.nekarantanis14.workers.dev) relays the GitHub OAuth
# handshake, since GitHub requires a server to hold the OAuth Client Secret.
# The Worker's GITHUB_CLIENT_ID / GITHUB_CLIENT_SECRET / ALLOWED_DOMAINS are
# set as runtime environment variables in its Cloudflare dashboard settings.
backend:
  name: github
  repo: Eneekay/nekarantanis
  branch: main
  base_url: https://decap-cms-auth.nekarantanis14.workers.dev

# Local testing without GitHub auth, via `npx decap-server`.
# Port 8082 here because 8081 (decap-server's default) was already taken
# by something else on this machine — change back to `true` (default 8081)
# if that's not the case for you, or adjust to whatever's free.
local_backend:
  url: http://localhost:8082/api/v1

media_folder: "uploads"
public_folder: "/uploads"

# publish_mode: editorial_workflow moves entries through Draft -> In Review
# -> Ready before they publish, instead of every save committing straight
# to `main` (which redeploys the live site immediately). Decap does this
# via GitHub PRs, using whatever repo permissions your own GitHub login has.
publish_mode: editorial_workflow

collections:
  - name: "posts"
    label: "Blog Posts"
    label_singular: "Post"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: title
    summary: "{{title}} — {{date}}"
    preview_path: "blog/{{slug}}.html"
    media_folder: "/uploads/posts"
    public_folder: "/uploads/posts"
    sortable_fields: ["date", "title", "category"]
    view_groups:
      - label: "Category"
        field: category
    view_filters:
      - label: "Tag: Leadership"
        field: tags
        pattern: "Leadership"
      - label: "Tag: Change Management"
        field: tags
        pattern: "Change Management"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - label: "Featured"
        name: "featured"
        widget: "boolean"
        required: false
        default: false
        hint: "Shows this post at the top of the Blog page instead of the grid. If left off every post, or checked on more than one, the newest post wins."
      - label: "Category"
        name: "category"
        widget: "select"
        hint: "Shown as the small label above the title. Pick an existing one where it fits, to keep grouping/filtering useful."
        options: ["Leadership", "Team Leadership", "Team Management", "Change Management", "Digital & Data", "Quality & Compliance", "Research & Practice", "Mentoring", "Leadership & Personal"]
      - label: "Icon"
        name: "icon"
        widget: "icon-picker"
        hint: "Click an icon to select it."
      - { label: "Card summary", name: "summary", widget: "text", hint: "Short blurb shown on the Blog listing card (not shown on the post itself)." }
      - { label: "Tags", name: "tags", widget: "list" }
      - label: "Featured image"
        name: "image"
        widget: "image"
        required: false
        hint: "Optional. If set, it's placed automatically partway through the article — no manual placement needed. Leave blank for no image."
      - { label: "Featured image alt text", name: "image_alt", widget: "string", required: false, hint: "Optional. Defaults to the post title if left blank." }
      - { label: "Featured image caption", name: "image_caption", widget: "string", required: false, hint: "Optional. Shown as small, discreet text under the image." }
      - { label: "Body", name: "body", widget: "markdown", hint: "The first paragraph is shown larger as the lede. Use a Markdown blockquote (> ...) for the pull-quote." }

  - name: "publications"
    label: "Publications"
    label_singular: "Publication"
    folder: "_publications"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}} — {{year}}"
    preview_path: "publications/{{slug}}.html"
    media_folder: "/uploads/publications"
    public_folder: "/uploads/publications"
    sortable_fields: ["year", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Year (for sorting and the counters)", name: "year", widget: "number", value_type: "int" }
      - { label: "Byline (natural reading order, e.g. \"Nikolaos-Evangelos Karantanis, Leszek Rychlik, Anthony Herrel, and Dionisios Youlatos\")", name: "authors_display", widget: "string" }
      - label: "Co-authors (excluding yourself, one per entry - feeds the \"collaborators\" counter on the Publications page)"
        name: "authors_list"
        widget: "list"
      - label: "Species studied (feeds the \"unique species\" counter)"
        name: "species"
        widget: "list"
      - label: "Keywords (from the article's own Keywords line - shown as this article's categories)"
        name: "keywords"
        widget: "list"
      - { label: "Journal", name: "journal", widget: "string" }
      - { label: "DOI URL", name: "doi", widget: "string", required: false }
      - label: "Icon"
        name: "icon"
        widget: "icon-picker"
        hint: "Click an icon to select it."
      - { label: "Card summary", name: "summary", widget: "text", hint: "Short blurb shown on the Publications listing card." }
      - label: "Full APA reference-list citation"
        name: "apa_citation"
        widget: "text"
        hint: "The complete, ready-to-copy APA 7th-edition reference-list entry for this work, e.g. \"Karantanis, N.-E., Rychlik, L., Herrel, A., & Youlatos, D. (2017). Arboreal gaits in three sympatric rodents... Mammalian Biology, 83, 51-63. https://doi.org/10.1016/j.mambio.2016.12.004\""
      - label: "Original PDF"
        name: "pdf"
        widget: "file"
        media_folder: "/uploads/publications"
        public_folder: "/uploads/publications"
        hint: "The original published PDF - powers the \"Download original PDF\" button at the end of the article."
      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Transcribed article body. Use ## for major sections (Abstract, Introduction, Methods, Results, Discussion, References, ...) - these automatically populate the sticky on-page navigation."

  - name: "about"
    label: "About Page"
    files:
      - name: "roles"
        label: "Career Roles"
        file: "_data/roles.yml"
        preview_path: "About.html"
        fields:
          - label: "Roles"
            name: "roles"
            widget: "list"
            summary: "{{fields.company}}"
            fields:
              - label: "Section"
                name: "section"
                widget: "select"
                options: ["leadership", "digital", "research"]
              - { label: "Company / Institution", name: "company", widget: "string" }
              - label: "Logo"
                name: "logo"
                widget: "image"
                media_folder: "/uploads/logos"
                public_folder: "/uploads/logos"
                hint: "Existing logos live directly under uploads/ (not uploads/logos/) - that's fine, this only changes where new uploads land."
              - { label: "Subtitle (location etc.)", name: "subtitle", widget: "string", required: false }
              - { label: "Date range", name: "dates", widget: "string", hint: "e.g. \"Jun 2025 – Present\"" }
              - { label: "Blurb", name: "blurb", widget: "text" }
              - label: "Positions"
                name: "positions"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Date range", name: "dates", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - label: "Icon"
                    name: "icon"
                    widget: "icon-picker"
                    required: false
                    hint: "Click an icon to select it."
                  - { label: "Primary (highlighted box; leave off for earlier roles at the same place)", name: "primary", widget: "boolean", required: false, default: false }
                  - { label: "Bullets", name: "bullets", widget: "list" }
                  - { label: "Tags", name: "tags", widget: "list", required: false }
