---
layout: default
---
<!-- ARTICLE HEADER -->
<div class="pin-cover-wrap">
<header class="section-dark-dotted text-c3 position-relative overflow-hidden pin-cover-header">
  <svg viewBox="0 0 200 200" class="post-header-blob">
    <circle cx="100" cy="100" r="100" fill="var(--nk-c1)"></circle>
  </svg>
  <div class="container position-relative post-header-inner">
    <a href="{{ page.base }}Blog.html" class="fs-14 fw-semibold text-gold">&larr; Back to Blog</a>
    <div class="d-flex align-items-center gap-3 mt-4 mb-3">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--nk-gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="heading-icon heading-icon--lg">{% include post-icon.html icon=page.icon %}</svg>
      <a href="{{ page.base }}Blog.html?category={{ page.category | url_encode }}" class="fs-13 fw-semibold text-gold text-uppercase ls-15">{{ page.category }}</a>
    </div>
    <h1 class="fs-post-title fw-semibold text-c4 mb-3 typewriter--on-dark" data-typewriter>{{ page.title }}</h1>
    <div class="fs-14 text-faint-dark">{{ page.date | date: "%d %b %Y" }}</div>
  </div>
</header>
</div>

<!-- ARTICLE BODY -->
<section class="position-relative overflow-hidden pin-cover-section pin-cover-section--flow">
  <svg width="0" height="0" style="position: absolute">
    <clipPath id="pinCoverWaveClip" clipPathUnits="objectBoundingBox">
      <path d="M0,0.4 C0.1667,0.9 0.3333,0 0.5,0.4 C0.6667,0.8 0.8333,0.1 1,0.5 L1,1 L0,1 Z"></path>
    </clipPath>
  </svg>
  <div class="pin-cover-shadow-blur"><div class="pin-cover-shadow"></div></div>
  <div class="pin-cover-wave-fill bg-c4"></div>
  <div class="bg-c4 pin-cover-body-fill"></div>
  <div class="container post-body-inner" data-reveal>
    {{ content }}
    <div class="d-flex flex-wrap gap-2 mt-4">
      {% for tag in page.tags %}<a href="{{ page.base }}Blog.html?tag={{ tag | url_encode }}" class="tag-pill on-card">{{ tag }}</a>{% endfor %}
    </div>
  </div>
  <svg class="wave-divider wave-divider--48" viewBox="0 0 1440 100" preserveAspectRatio="none">
    <path d="M0,50 C240,0 480,90 720,45 C960,5 1200,85 1440,40 L1440,100 L0,100 Z" class="fill-c0"></path>
  </svg>
</section>

<!-- CTA -->
<section class="section-dark-dotted position-relative overflow-hidden">
  <svg viewBox="0 0 200 200" class="post-cta-blob post-cta-blob-1">
    <path d="M100,15 C135,10 170,35 180,70 C190,110 175,150 140,175 C105,200 60,195 35,165 C10,135 5,90 25,55 C40,28 65,20 100,15 Z" fill="var(--nk-c2)"></path>
  </svg>
  <svg viewBox="0 0 200 200" class="post-cta-blob post-cta-blob-2">
    <path d="M95,10 C130,5 165,25 180,60 C198,100 185,145 150,170 C115,195 65,190 35,160 C5,130 0,80 25,45 C45,18 65,15 95,10 Z" fill="var(--nk-c2)"></path>
  </svg>
  <div class="container position-relative text-center post-cta-inner z-1">
    <h2 class="fs-24 mb-4 text-c4">Continue reading</h2>
    <a href="{{ page.base }}Blog.html" class="btn-nk btn-nk-solid-c1 btn-nk--sm">Back to all posts</a>
  </div>
</section>
