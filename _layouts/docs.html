<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} — {% endif %}Site Documentation</title>
<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="{{ '/css/custom.css' | relative_url }}?v={{ site.time | date: '%s' }}" rel="stylesheet">
<link href="{{ '/docs/assets/docs.css' | relative_url }}" rel="stylesheet">
</head>
<body class="docs-body">

<div class="docs-topbar">
  <div class="docs-topbar-inner">
    <button class="docs-nav-toggle" id="docsNavToggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <a href="{{ '/docs/' | relative_url }}" class="docs-brand">
      <span class="docs-brand-mark" aria-hidden="true"></span>
      N.&nbsp;E.&nbsp;Karantanis &mdash; Site Docs
    </a>
    <a href="{{ '/' | relative_url }}" class="docs-topbar-live" target="_blank" rel="noopener">View live site &#8599;</a>
  </div>
</div>

<div class="docs-shell">
  <div class="docs-nav-backdrop" id="docsNavBackdrop"></div>
  <nav class="docs-sidebar" id="docsSidebar">
    {% include docs-nav.html %}
  </nav>

  <main class="docs-content">
    <article>
      <div class="docs-eyebrow">Documentation</div>
      <h1>{{ page.title }}</h1>
      {{ content }}

      {% if page.next_title %}
      <div class="docs-pagenav">
        <a href="{{ page.next_url | relative_url }}" class="docs-pagenav-next">
          <span class="docs-pagenav-label">Next</span>
          <span class="docs-pagenav-title">{{ page.next_title }} &rarr;</span>
        </a>
      </div>
      {% endif %}
    </article>
  </main>

  <aside class="docs-toc">
    <div class="docs-toc-label">On this page</div>
    <ul id="docsTocList"></ul>
  </aside>
</div>

<script src="{{ '/docs/assets/docs.js' | relative_url }}"></script>
</body>
</html>
